mutation buildDiscovery($input: BuildDiscoveryInput!) {
  buildDiscovery(input: $input) {
    status
    datasetVersion
    solverVersion
    cacheKey
    query {
      className
      level
      elements
      mode
      apTarget
      mpTarget
      rangeTarget
      damageSurvivabilityPreset
      budgetTier
      exoPolicy
      weaponPolicy
      lockedItemIds
      avoidedItemIds
      resultLimit
      maxSharedItems
    }
    targetSemantics {
      type
      targets {
        ap
        mp
        range
      }
      caps {
        ap
        mp
        range
      }
      surplusScoring
    }
    warnings
    noBuildReason {
      code
      unavailableItemIds
      wrongSlotItemIds
    }
    diagnostics {
      elapsedMs
      cacheHit
      appCacheHit
      resultCount
      solver
      cacheStatus
      solveLockAcquired
      lockWaitMs
      solverStatus
      itemCount
      candidateCount
      maxSharedItems
      maxSharedItemsEnforced
      timings {
        name
        elapsedMs
      }
    }
    cache {
      status
      storage
      solver
    }
    builds {
      promotionToken
      score
      weightedStatScore
      utilityStatScore
      genericDamageScore
      rawRotationDamageScore
      spellDamageScore
      profileBaselineDamageScore
      profileRelativeDamage
      weaponDamageScore
      survivabilityScore
      negativeResistancePenalty
      weakestElementEhp
      apStrategy
      conditionFailures
      baseAllocation {
        name
        value
      }
      totals {
        name
        value
      }
      sets {
        name
        itemCount
      }
      exos {
        stat
        itemId
        slot
      }
      items {
        slot
        id
        internalId
        name
        type
        level
        set
      }
    }
  }
}
