# A generic, single database configuration.

# Notes:
# To get Alembic to work in the devcontainer, I had to:
# cd server
# pip install -r requirements.txt
# set -a
# source .env.docker
# set +a
# alembic --config app/migrations/alembic.ini revision -m "Mount ID migration for Dofus v3.5"

[alembic]
script_location = app/migrations/
# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
